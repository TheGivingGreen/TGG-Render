<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RENDER Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Anton', 'Arial Narrow', sans-serif;
    --font-text: 'Work Sans', 'Helvetica Neue', Arial, sans-serif;
    --text-heading-md: 600 16px/1.5 var(--font-text);
    --text-body-strong: 600 16px/1.5 var(--font-text);
    --text-button-sm: 600 14px/1.4 var(--font-text);
    --text-caption-sm: 500 12px/1.5 var(--font-text);
    --text-utility-xs: 500 11px/1.6 var(--font-text);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Work Sans', sans-serif; }
  textarea, input, select, button { font-family: inherit; }
  input, textarea, select { outline: none; }
  input:focus, textarea:focus, select:focus { outline: 2px solid rgba(255,90,95,0.45); outline-offset: 1px; }

  @keyframes rs-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes rs-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rs-fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .rs-imagery-tile .rs-overlay,
  .rs-photo-tile .rs-overlay { opacity: 0; transition: opacity 0.15s ease; }
  .rs-imagery-tile:hover .rs-overlay,
  .rs-photo-tile:hover .rs-overlay { opacity: 1; }

  .rs-mini-frame { transition: transform 0.15s ease; }
  .rs-mini-frame:hover { transform: translateY(-3px); }

  .rs-pill-btn { transition: opacity 0.15s ease, background-color 0.15s ease; }
  .rs-pill-btn:hover { opacity: 0.88; }

  .rs-frames-scroll::-webkit-scrollbar { height: 8px; }
  .rs-frames-scroll::-webkit-scrollbar-thumb { background: rgba(23,63,53,0.2); border-radius: 999px; }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="rs-file-input" accept="image/*" style="display:none">

<script>
(function () {
  'use strict';

  var ACCENT = '#FF5A5F';
  var STORAGE_KEY = 'renderStudio.v1';

  var FONT_PAIRS = [
    { key: 'archivo-inter', name: 'Archivo Black', heading: "'Archivo Black', sans-serif", body: "'Inter', sans-serif" },
    { key: 'bebas-work', name: 'Bebas Neue', heading: "'Bebas Neue', sans-serif", body: "'Work Sans', sans-serif" },
    { key: 'space-mono', name: 'Space Grotesk', heading: "'Space Grotesk', sans-serif", body: "'Space Mono', monospace" },
    { key: 'playfair-source', name: 'Playfair Display', heading: "'Playfair Display', serif", body: "'Source Sans 3', sans-serif" }
  ];

  var SWATCH_PALETTE = ['#15130F','#F4EFE6','#C1461D','#6B7156','#2B2B2E','#D8CFC0','#8A3B2B','#3E4A3D','#B23A48','#2B6CFF','#1FA97C','#E8B84B'];

  var PHOTO_BGS = ['#2B2B2E', '#C1461D', '#6B7156', '#15130F', '#8A3B2B', '#3E4A3D'];

  var HOOK_LINES = ['NEW DROP', 'MADE TO LAST', 'LIMITED RUN', 'RAW MATERIALS', 'BUILT FOR IT', 'NO SHORTCUTS', 'RESTOCKED', 'ONE OF ONE'];

  var LIGHT_THEME = {
    bg: '#F5F0E3', text: '#173F35', muted: '#5D7C62', cardBg: '#FFFFFF',
    border: 'rgba(23,63,53,0.16)', inputBg: '#EAE2CC', chipBg: '#DCE6DD', skeleton: '#EAE2CC',
    achievementBg: '#F1EACB', achievementBorder: '#B9A35A',
    shadow: '0 1px 2px rgba(23,63,53,0.06), 0 8px 24px rgba(23,63,53,0.08)',
    shadowRaised: '0 4px 12px rgba(23,63,53,0.12), 0 16px 40px rgba(23,63,53,0.14)'
  };
  var DARK_THEME = {
    bg: '#0E2921', text: '#FFFFFF', muted: '#B9CBC1', cardBg: '#245446',
    border: 'rgba(255,255,255,0.18)', inputBg: '#173F35', chipBg: 'rgba(255,255,255,0.08)', skeleton: '#173F35',
    achievementBg: 'rgba(185,163,90,0.18)', achievementBorder: '#B9A35A',
    shadow: '0 1px 2px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.3)',
    shadowRaised: '0 4px 16px rgba(0,0,0,0.35), 0 16px 44px rgba(0,0,0,0.4)'
  };

  function pad(n) { return String(n).padStart(2, '0'); }
  function defaultDateStr(daysAhead) {
    var d = new Date();
    d.setDate(d.getDate() + daysAhead);
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  function formatDateLabel(dateStr, timeStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-').map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label = months[dt.getMonth()] + ' ' + dt.getDate();
    if (timeStr) label += ' at ' + timeStr;
    return label;
  }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  var uid = 100;
  function nextId() { return uid++; }

  function defaultBrand() {
    return {
      name: 'ARCFORM',
      colors: ['#15130F', '#F4EFE6', '#C1461D', '#6B7156'],
      fontPairKey: 'archivo-inter',
      vibeTags: ['Raw', 'Utilitarian', 'Street', 'Minimal'],
      imagery: [{ id: 1, bg: '#2B2B2E' }],
      photos: [
        { id: 1, label: 'Cargo Pant - Front', role: 'product' },
        { id: 2, label: 'Raw Hoodie - Detail', role: 'product' },
        { id: 3, label: 'Studio - Lookbook', role: 'lifestyle' },
        { id: 4, label: 'Utility Vest - Flat Lay', role: 'product' }
      ]
    };
  }

  function defaultState() {
    return {
      darkMode: false,
      sidebarCollapsed: false,
      scheduledPopoverOpen: false,
      brandUrl: 'https://arcform.com',
      analyzing: false,
      analyzed: true,
      activeSwatchIndex: null,
      newTagValue: '',
      brand: defaultBrand(),
      topic: 'New drop: restocked cargo pants + raw-edge hoodie',
      ideaCount: 3,
      ideasLoading: false,
      ideas: [],
      openIdeaId: null,
      generateError: null,
      analyzeError: null,
      configStatus: null
    };
  }

  function loadState() {
    var base = defaultState();
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        ['darkMode', 'sidebarCollapsed', 'brandUrl', 'analyzed', 'brand', 'topic', 'ideaCount', 'ideas'].forEach(function (k) {
          if (saved[k] !== undefined) base[k] = saved[k];
        });
      }
    } catch (e) { /* corrupt storage, fall back to defaults */ }

    var maxId = 100;
    (base.brand.photos || []).forEach(function (p) { if (p.id > maxId) maxId = p.id; });
    (base.brand.imagery || []).forEach(function (im) { if (im.id > maxId) maxId = im.id; });
    (base.ideas || []).forEach(function (i) { if (i.id > maxId) maxId = i.id; });
    uid = maxId + 1;
    base.ideaCount = Math.max(3, Math.min(10, Number(base.ideaCount) || 3));
    base.brand.photos = (base.brand.photos || []).map(function (p) {
      return Object.assign({ label: 'Untitled asset', role: 'reference', dataUrl: null }, p, { role: p.role || 'product' });
    });
    base.ideas = (base.ideas || []).map(function (idea) {
      return Object.assign({ renderPrompt: '' }, idea, { frameCount: Math.max(3, Number(idea.frameCount) || 3) });
    });

    return base;
  }

  function saveState() {
    try {
      var toSave = {
        darkMode: state.darkMode,
        sidebarCollapsed: state.sidebarCollapsed,
        brandUrl: state.brandUrl,
        analyzed: state.analyzed,
        brand: state.brand,
        topic: state.topic,
        ideaCount: state.ideaCount,
        ideas: state.ideas
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch (e) { /* storage unavailable, continue in-memory only */ }
  }

  var state = loadState();
  var root = document.getElementById('app');
  var eventsBound = false;

  function set(patch) {
    if (typeof patch === 'function') patch = patch(state);
    Object.assign(state, patch);
    saveState();
    render();
  }
  function setSilent(patch) {
    if (typeof patch === 'function') patch = patch(state);
    Object.assign(state, patch);
    saveState();
  }
  function updateBrand(patch) {
    set({ brand: Object.assign({}, state.brand, typeof patch === 'function' ? patch(state.brand) : patch) });
  }
  function updateBrandSilent(patch) {
    setSilent({ brand: Object.assign({}, state.brand, typeof patch === 'function' ? patch(state.brand) : patch) });
  }
  function updateIdea(id, patch) {
    set({ ideas: state.ideas.map(function (i) { return i.id === id ? Object.assign({}, i, patch) : i; }) });
  }
  function updateIdeaPartial(id, patch) {
    updateIdeaSilent(id, patch);
    renderIdeaSurfaces(id);
  }
  function updateIdeaSilent(id, patch) {
    setSilent({ ideas: state.ideas.map(function (i) { return i.id === id ? Object.assign({}, i, patch) : i; }) });
  }
  function findIdea(id) { return state.ideas.find(function (i) { return i.id === id; }); }

  function buildDefaultRenderPrompt(idea, brand) {
    var assets = (brand.photos || []).map(function (p) {
      return (p.label || 'Untitled asset') + ' [' + (p.role || 'reference') + ']';
    }).join('; ');
    return 'Create a premium Instagram carousel slide for ' + brand.name + '. ' +
      'Concept: ' + idea.concept + '. ' +
      'Use the uploaded assets intentionally by label and role: ' + (assets || 'none') + '. ' +
      'Keep text bold, legible, and minimal. Match the brand colors and editorial direction.';
  }

  // ---- actions ----

  function toggleDarkMode() { set({ darkMode: !state.darkMode }); }
  function toggleSidebar() { set({ sidebarCollapsed: !state.sidebarCollapsed }); }
  function toggleScheduledPopover() { set({ scheduledPopoverOpen: !state.scheduledPopoverOpen }); }

  function isDefaultSampleAsset(p) {
    return !p.dataUrl && ['Cargo Pant - Front', 'Raw Hoodie - Detail', 'Studio - Lookbook', 'Utility Vest - Flat Lay'].indexOf(p.label) !== -1;
  }

  function normalizeAnalyzedAssetId(asset) {
    var id = asset.id;
    return typeof id === 'number' ? id : nextId();
  }

  function onAnalyze() {
    var url = (state.brandUrl || '').trim();
    if (!url) {
      set({ analyzeError: 'Paste a brand URL first.' });
      return;
    }
    set({ analyzing: true, analyzed: false, analyzeError: null });

    fetch('/api/analyze-brand', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    }).then(parseJsonResponse).then(function (result) {
      if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to analyze brand.');
      var analyzedBrand = result.data.brand || {};
      var existingUploads = (state.brand.photos || []).filter(function (p) { return p.dataUrl && /^data:/i.test(p.dataUrl) && !isDefaultSampleAsset(p); });
      var analyzedPhotos = (analyzedBrand.photos || []).map(function (p) {
        return {
          id: normalizeAnalyzedAssetId(p),
          label: p.label || 'Website asset',
          role: p.role || 'reference',
          dataUrl: p.dataUrl || null
        };
      });
      var analyzedImagery = (analyzedBrand.imagery || []).map(function (im) {
        return {
          id: normalizeAnalyzedAssetId(im),
          dataUrl: im.dataUrl || null,
          bg: im.bg || '#2B2B2E'
        };
      });
      var nextBrand = Object.assign({}, state.brand, {
        name: analyzedBrand.name || state.brand.name,
        colors: analyzedBrand.colors && analyzedBrand.colors.length ? analyzedBrand.colors : state.brand.colors,
        vibeTags: analyzedBrand.vibeTags && analyzedBrand.vibeTags.length ? analyzedBrand.vibeTags : state.brand.vibeTags,
        photos: analyzedPhotos.concat(existingUploads).slice(0, 10),
        imagery: analyzedImagery.length ? analyzedImagery : state.brand.imagery
      });
      if (!nextBrand.photos.length) nextBrand.photos = existingUploads;
      set({
        brand: nextBrand,
        ideas: [],
        openIdeaId: null,
        analyzed: true,
        analyzing: false,
        analyzeError: result.data.source && result.data.source.fetchError ? result.data.source.fetchError : null
      });
    }).catch(function (err) {
      set({ analyzing: false, analyzed: true, analyzeError: err.message });
    });
  }

  function onSwatchClick(i) { set({ activeSwatchIndex: state.activeSwatchIndex === i ? null : i }); }
  function onPickColor(i, hex) {
    var colors = state.brand.colors.slice();
    colors[i] = hex;
    set({ brand: Object.assign({}, state.brand, { colors: colors }), activeSwatchIndex: null });
  }
  function onAddSwatch() { updateBrand(function (b) { return { colors: b.colors.concat([pick(SWATCH_PALETTE)]) }; }); }

  function onCycleFont() {
    updateBrand(function (b) {
      var idx = FONT_PAIRS.findIndex(function (f) { return f.key === b.fontPairKey; });
      return { fontPairKey: FONT_PAIRS[(idx + 1) % FONT_PAIRS.length].key };
    });
  }

  function onNewTagKeyDown(e) {
    if (e.key === 'Enter' && state.newTagValue.trim()) {
      var val = state.newTagValue.trim();
      updateBrand(function (b) { return { vibeTags: b.vibeTags.concat([val]) }; });
      set({ newTagValue: '' });
    }
  }
  function onRemoveTag(i) { updateBrand(function (b) { return { vibeTags: b.vibeTags.filter(function (_, idx) { return idx !== i; }) }; }); }

  function onRemovePhoto(id) { updateBrand(function (b) { return { photos: b.photos.filter(function (p) { return p.id !== id; }) }; }); }

  // Real photo upload: Claude needs to actually see product photos to pick one
  // per carousel slide, and Fal needs a real reference image for best results.
  var pendingUpload = null;
  function triggerUpload(kind, id) {
    pendingUpload = { kind: kind, id: id };
    document.getElementById('rs-file-input').click();
  }
  function humanizeFilename(name) {
    return name.replace(/\.[^/.]+$/, '').replace(/[-_]+/g, ' ').replace(/\b\w/g, function (ch) { return ch.toUpperCase(); });
  }
  function onFileChosen(file) {
    if (!file || !pendingUpload) return;
    var target = pendingUpload;
    pendingUpload = null;
    var reader = new FileReader();
    reader.onload = function () {
      var dataUrl = reader.result;
      var label = humanizeFilename(file.name);
      if (target.kind === 'photo') {
        if (target.id == null) {
          updateBrand(function (b) { return { photos: b.photos.concat([{ id: nextId(), label: label, role: 'product', dataUrl: dataUrl }]) }; });
        } else {
          updateBrand(function (b) { return { photos: b.photos.map(function (p) { return p.id === target.id ? Object.assign({}, p, { label: label, role: p.role || 'product', dataUrl: dataUrl }) : p; }) }; });
        }
      } else {
        if (target.id == null) {
          updateBrand(function (b) { return { imagery: b.imagery.concat([{ id: nextId(), dataUrl: dataUrl }]) }; });
        } else {
          updateBrand(function (b) { return { imagery: b.imagery.map(function (im) { return im.id === target.id ? Object.assign({}, im, { dataUrl: dataUrl }) : im; }) }; });
        }
      }
    };
    reader.readAsDataURL(file);
  }

  function onIncIdeaCount() { set({ ideaCount: Math.min(10, state.ideaCount + 1) }); }
  function onDecIdeaCount() { set({ ideaCount: Math.max(3, state.ideaCount - 1) }); }

  function parseJsonResponse(r) {
    return r.json().catch(function () { return {}; }).then(function (data) { return { ok: r.ok, data: data }; });
  }

  function generateIdeas() {
    set({ ideasLoading: true, ideas: [], generateError: null });
    var count = state.ideaCount;
    var topic = state.topic || 'the new collection';
    var brand = state.brand;

    fetch('/api/generate-ideas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic, count: count, brand: { name: brand.name, colors: brand.colors, vibeTags: brand.vibeTags } })
    }).then(parseJsonResponse).then(function (result) {
      if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to generate ideas.');
      var ideas = (result.data.ideas || []).map(function (c) {
        var idea = {
          id: nextId(),
          tag: c.tag,
          title: c.title,
          concept: c.concept,
          caption: c.caption,
          frameCount: 3,
          renderPrompt: '',
          expanded: true,
          imagesStatus: 'none',
          frames: [],
          renderError: null,
          approved: false,
          scheduleOpen: false,
          scheduled: false,
          scheduleError: null,
          scheduleDate: defaultDateStr(3),
          scheduleTime: '10:00',
          schedulePlatform: 'Instagram Feed',
          scheduledLabel: ''
        };
        idea.renderPrompt = buildDefaultRenderPrompt(idea, state.brand);
        return idea;
      });
      set({ ideas: ideas, ideasLoading: false });
    }).catch(function (err) {
      set({ ideasLoading: false, ideas: [], generateError: err.message });
    });
  }

  function onToggleExpand(id) { var idea = findIdea(id); updateIdea(id, { expanded: !idea.expanded }); }
  function onIncFrames(id) {
    var idea = findIdea(id);
    if (idea.imagesStatus === 'ready') return;
    updateIdea(id, { frameCount: Math.min(8, idea.frameCount + 1) });
  }
  function onDecFrames(id) {
    var idea = findIdea(id);
    if (idea.imagesStatus === 'ready') return;
    updateIdea(id, { frameCount: Math.max(3, idea.frameCount - 1) });
  }

  // gpt-image-2 can take longer than any serverless function is allowed to run,
  // so rendering is submit-then-poll: /api/render-carousel just enqueues one Fal
  // job per slide and returns immediately; /api/render-status is polled every
  // ~3s until every slide is complete or failed. GPT image edits can sit
  // IN_PROGRESS for several minutes, so avoid turning healthy Fal jobs into
  // fake client-side failures too early.
  var RENDER_POLL_INTERVAL_MS = 3000;
  var RENDER_MAX_POLLS = 160; // ~8 minutes of polling before giving up client-side

  function onMakeImages(id) {
    var idea = findIdea(id);
    if (!idea) return;
    var brand = state.brand;
    var renderPrompt = (idea.renderPrompt || '').trim() || buildDefaultRenderPrompt(idea, brand);
    updateIdeaPartial(id, { imagesStatus: 'generating', renderError: null, renderPrompt: renderPrompt, frames: [] });

    fetch('/api/render-carousel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        idea: { title: idea.title, concept: idea.concept, renderPrompt: renderPrompt },
        frameCount: idea.frameCount,
        brand: {
          name: brand.name,
          colors: brand.colors,
          photos: brand.photos.map(function (p) { return { id: p.id, label: p.label, role: p.role || 'reference', dataUrl: p.dataUrl || null }; })
        }
      })
    }).then(parseJsonResponse).then(function (result) {
      if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to start render.');
      var slides = result.data.slides || [];
      if (!slides.length) throw new Error('No slides were submitted.');
      var frames = slides.map(function (s) {
        return { n: s.n, hook: s.hook, photoId: s.photoId, photoLabel: s.photoLabel, photoRole: s.photoRole, prompt: s.prompt, endpoint: s.endpoint, requestId: s.requestId, imageUrl: null, status: 'pending', error: null };
      });
      updateIdeaPartial(id, { frames: frames });
      pollRenderStatus(id, 0);
    }).catch(function (err) {
      updateIdeaPartial(id, { imagesStatus: 'none', renderError: err.message });
    });
  }

  function retrySlide(id, slideNumber) {
    var idea = findIdea(id);
    if (!idea) return;
    var frame = (idea.frames || []).find(function (f) { return f.n === slideNumber; });
    if (!frame) return;
    submitRetrySlides(id, [frame]);
  }

  function retryFailedSlides(id) {
    var idea = findIdea(id);
    if (!idea) return;
    var failed = (idea.frames || []).filter(function (f) { return f.status === 'failed'; });
    if (!failed.length) return;
    submitRetrySlides(id, failed);
  }

  function submitRetrySlides(id, framesToRetry) {
    var idea = findIdea(id);
    if (!idea) return;
    var brand = state.brand;
    var retryNumbers = framesToRetry.map(function (f) { return f.n; });
    var renderPrompt = (idea.renderPrompt || '').trim() || buildDefaultRenderPrompt(idea, brand);
    var queuedFrames = (idea.frames || []).map(function (f) {
      return retryNumbers.indexOf(f.n) !== -1
        ? Object.assign({}, f, { status: 'submitting', error: null, imageUrl: null, prompt: renderPrompt })
        : f;
    });
    updateIdeaPartial(id, { imagesStatus: 'generating', renderError: null, renderPrompt: renderPrompt, frames: queuedFrames });

    Promise.all(framesToRetry.map(function (frame) {
      return fetch('/api/render-slide', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          idea: { title: idea.title, concept: idea.concept, renderPrompt: renderPrompt },
          brand: {
            name: brand.name,
            colors: brand.colors,
            photos: brand.photos.map(function (p) { return { id: p.id, label: p.label, role: p.role || 'reference', dataUrl: p.dataUrl || null }; })
          },
          slide: { n: frame.n, hook: frame.hook || ('SLIDE ' + frame.n), photoId: frame.photoId || null }
        })
      }).then(parseJsonResponse).then(function (result) {
        if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to retry slide ' + frame.n + '.');
        return result.data.slide;
      });
    })).then(function (slides) {
      var current = findIdea(id);
      if (!current) return;
      var merged = current.frames.map(function (f) {
        var s = slides.find(function (x) { return x.n === f.n; });
        if (!s) return f;
        return Object.assign({}, f, {
          hook: s.hook,
          photoId: s.photoId,
          photoLabel: s.photoLabel,
          photoRole: s.photoRole,
          prompt: s.prompt,
          endpoint: s.endpoint,
          requestId: s.requestId,
          imageUrl: null,
          status: 'pending',
          error: null
        });
      });
      updateIdeaPartial(id, { frames: merged });
      pollRenderStatus(id, 0);
    }).catch(function (err) {
      var current = findIdea(id);
      if (!current) return;
      var failedFrames = current.frames.map(function (f) {
        return retryNumbers.indexOf(f.n) !== -1 && f.status === 'submitting'
          ? Object.assign({}, f, { status: 'failed', error: err.message })
          : f;
      });
      updateIdeaPartial(id, { frames: failedFrames, imagesStatus: 'ready', renderError: err.message });
    });
  }

  function pollRenderStatus(id, attempt) {
    var idea = findIdea(id);
    if (!idea || idea.imagesStatus !== 'generating') return; // cancelled/replaced elsewhere

    var pending = idea.frames.filter(function (f) { return f.status === 'pending'; });
    if (!pending.length) { finishRender(id); return; }

    if (attempt >= RENDER_MAX_POLLS) {
      var timedOutFrames = idea.frames.map(function (f) {
        return f.status === 'pending' ? Object.assign({}, f, { status: 'failed', error: 'Timed out waiting for Fal after 8 minutes. The job may still be running; retry this slide.' }) : f;
      });
      updateIdeaPartial(id, { frames: timedOutFrames });
      finishRender(id);
      return;
    }

    fetch('/api/render-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobs: pending.map(function (f) { return { n: f.n, endpoint: f.endpoint, requestId: f.requestId }; }) })
    }).then(parseJsonResponse).then(function (result) {
      if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to check render status.');
      var updates = result.data.slides || [];
      var current = findIdea(id);
      if (!current) return;
      var merged = current.frames.map(function (f) {
        var u = updates.find(function (x) { return x.n === f.n; });
        if (!u) return f;
        if (u.status === 'complete') return Object.assign({}, f, { status: 'complete', imageUrl: u.imageUrl });
        if (u.status === 'failed') return Object.assign({}, f, { status: 'failed', error: u.error });
        return f;
      });
      updateIdeaPartial(id, { frames: merged });
      if (merged.some(function (f) { return f.status === 'pending'; })) {
        setTimeout(function () { pollRenderStatus(id, attempt + 1); }, RENDER_POLL_INTERVAL_MS);
      } else {
        finishRender(id);
      }
    }).catch(function (err) {
      updateIdeaPartial(id, { imagesStatus: 'none', renderError: err.message });
    });
  }

  function finishRender(id) {
    var idea = findIdea(id);
    if (!idea) return;
    var frames = idea.frames || [];
    var allFailed = frames.length > 0 && frames.every(function (f) { return f.status === 'failed'; });
    if (allFailed) {
      var firstError = (frames.find(function (f) { return f.error; }) || {}).error;
      updateIdeaPartial(id, {
        imagesStatus: 'none',
        renderError: 'All slides failed to render. First error: ' + (firstError || 'No Fal error was returned.')
      });
    } else {
      updateIdeaPartial(id, { imagesStatus: 'ready' });
    }
  }

  function onOpenIdea(id) { set({ openIdeaId: id }); }
  function onCloseModal() { set({ openIdeaId: null }); }

  function onToggleApprove(id) { var idea = findIdea(id); updateIdea(id, { approved: !idea.approved }); }
  function onOpenSchedule(id) { updateIdea(id, { scheduleOpen: true, scheduleError: null }); }
  function onConfirmSchedule(id) {
    var idea = findIdea(id);
    if (!idea) return;
    updateIdea(id, { scheduleError: null });
    var imageUrls = (idea.frames || []).map(function (f) { return f.imageUrl; }).filter(Boolean);

    fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        caption: idea.caption,
        imageUrls: imageUrls,
        scheduleDate: idea.scheduleDate,
        scheduleTime: idea.scheduleTime,
        platform: idea.schedulePlatform
      })
    }).then(parseJsonResponse).then(function (result) {
      if (!result.ok) throw new Error((result.data && result.data.error) || 'Failed to schedule post.');
      updateIdea(id, { scheduled: true, scheduleOpen: false, scheduledLabel: formatDateLabel(idea.scheduleDate, idea.scheduleTime) });
    }).catch(function (err) {
      updateIdea(id, { scheduleError: err.message });

  function makeCard(idea, index, brand, theme) {
    var frames = idea.frames.length ? idea.frames : Array.from({ length: idea.frameCount }, function (_, i) {
      return { n: i + 1, bg: PHOTO_BGS[i % PHOTO_BGS.length], photoLabel: '', hook: '' };
    });
    var miniFrames = [
      { top: 0, left: 48, n: 3 },
      { top: 15, left: 24, n: 2 },
      { top: 30, left: 0, n: 1 }
    ];
    var colorA = brand.colors[index % brand.colors.length];
    var colorB = brand.colors[(index + 1) % brand.colors.length];
    return {
      id: idea.id,
      n: index + 1,
      tag: idea.tag,
      title: idea.title,
      concept: idea.concept,
      caption: idea.caption,
      renderPrompt: idea.renderPrompt || buildDefaultRenderPrompt(idea, brand),
      frameCount: idea.frameCount,
      expanded: idea.expanded,
      visualBg: 'linear-gradient(160deg, ' + colorA + ' 0%, ' + colorA + ' 55%, ' + colorB + ' 55%, ' + colorB + ' 100%)',
      hook: HOOK_LINES[(index + idea.id) % HOOK_LINES.length],
      miniFrames: miniFrames,
      imagesStatus: idea.imagesStatus,
      renderError: idea.renderError,
      scheduled: idea.scheduled,
      scheduledLabel: idea.scheduledLabel,
      schedulePlatform: idea.schedulePlatform,
      approved: idea.approved,
      approveColor: idea.approved ? ACCENT : theme.muted,
      approveToggleLabel: idea.approved ? '✓ Approved' : 'Approve',
      approveLabel: idea.approved ? 'Approved' : 'Not approved yet',
      frames: frames,
      failedFrameCount: (idea.frames || []).filter(function (f) { return f.status === 'failed'; }).length,
      scheduleDate: idea.scheduleDate,
      scheduleTime: idea.scheduleTime,
      scheduleError: idea.scheduleError,
      showScheduleForm: !!idea.scheduleOpen && !idea.scheduled,
      showScheduleButton: !!idea.approved && !idea.scheduleOpen && !idea.scheduled
    };
  }

        '<textarea data-bind="topic" placeholder="e.g. New drop: restocked cargo pants + raw-edge hoodie" rows="2" style="width:100%; resize:vertical; font-family:inherit; font-size:14px; padding:11px 13px; border:1px solid ' + theme.border + '; border-radius:12px; background:' + theme.inputBg + '; color:' + theme.text + ';">' + esc(state.topic) + '</textarea>' +
      '</div>' +
      '<div>' +
        '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;"># of ideas</div>' +
        '<div style="display:flex; align-items:center; border:1px solid ' + theme.border + '; border-radius:10px; overflow:hidden; height:44px;">' +
          '<div data-action="dec-idea-count" style="width:32px; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:' + theme.text + '; font-size:16px; user-select:none;">−</div>' +
          '<div style="width:34px; text-align:center; font-size:14px; font-weight:700;">' + state.ideaCount + '</div>' +
          '<div data-action="inc-idea-count" style="width:32px; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:' + theme.text + '; font-size:16px; user-select:none;">＋</div>' +
        '</div>' +
      '</div>' +
      '<div data-action="generate" style="height:44px; padding:0 24px; border-radius:999px; background:' + ACCENT + '; color:#fff; font-weight:700; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;">' +
        (state.ideasLoading ? 'Generating…' : 'Generate ideas') +
      '</div>' +
    '</div>';

    var body;
    if (state.ideasLoading) {
      var rows = Array.from({ length: Math.min(state.ideaCount, 5) }, function () {
        return '<div style="background:' + theme.cardBg + '; border:1px solid ' + theme.border + '; border-radius:16px; padding:20px; display:flex; gap:16px; align-items:center;">' +
          '<div style="width:96px; height:64px; border-radius:10px; background:' + theme.skeleton + '; animation:rs-pulse 1.3s ease-in-out infinite;"></div>' +
          '<div style="flex:1; display:flex; flex-direction:column; gap:8px;">' +
            '<div style="width:40%; height:12px; border-radius:4px; background:' + theme.skeleton + '; animation:rs-pulse 1.3s ease-in-out infinite;"></div>' +
            '<div style="width:80%; height:12px; border-radius:4px; background:' + theme.skeleton + '; animation:rs-pulse 1.3s ease-in-out infinite;"></div>' +
          '</div>' +
        '</div>';
      }).join('');
      body = '<div style="display:flex; flex-direction:column; gap:14px;">' + rows + '</div>';
    } else if (cards.length) {
      body = '<div style="display:flex; flex-direction:column; gap:16px;">' + cards.map(function (c) { return renderIdeaCard(theme, c); }).join('') + '</div>';
    } else if (state.generateError) {
      body = '<div style="text-align:center; padding:60px 20px; color:#C0392B; font-size:14px; line-height:1.5;">Couldn’t generate ideas: ' + esc(state.generateError) + '</div>';
    } else {
      body = '<div style="text-align:center; padding:60px 20px; color:' + theme.muted + '; font-size:14px;">Describe what your posts should be about, then hit Generate.</div>';
    }

    return '<div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:20px; padding:24px 28px;">' + directionBar + body + '</div>';
  }

  function renderIdeaCard(theme, c) {
    var caret = c.expanded ? 'rotate(0deg)' : 'rotate(-90deg)';
    var scheduledTag = c.scheduled ? '<span style="font:var(--text-caption-sm); color:' + theme.text + '; background:' + theme.achievementBg + '; border:1px solid ' + theme.achievementBorder + '; border-radius:999px; padding:4px 12px; letter-spacing:0.02em; text-transform:uppercase;">Scheduled</span>' : '';
    var approvedTag = c.approved ? '<span style="font:var(--text-caption-sm); color:' + ACCENT + ';">Approved</span>' : '';

    var expandedBody = '';
    if (c.expanded) {
      var miniFrames = c.miniFrames.map(function (mf) {
        return '<div class="rs-mini-frame" style="position:absolute; top:' + mf.top + 'px; left:' + mf.left + 'px; width:111px; height:150px; border-radius:10px; background-image: repeating-linear-gradient(45deg, ' + theme.border + ' 0, ' + theme.border + ' 1px, transparent 1px, transparent 9px); background-color:' + theme.inputBg + '; border:1px dashed ' + theme.border + ';">' +
          '<div style="position:absolute; bottom:8px; right:8px; width:22px; height:22px; border-radius:5px; background:' + ACCENT + '; color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;">' + mf.n + '</div>' +
        '</div>';
      }).join('');

      var frameControlDisabled = c.imagesStatus === 'ready';
      var actionBlock;
      if (c.imagesStatus === 'ready') {
        actionBlock = '<div data-action="open-idea" data-id="' + c.id + '" style="text-align:center; padding:11px 10px; border-radius:999px; border:1px solid ' + theme.text + '; font-size:13px; font-weight:700; cursor:pointer; color:' + theme.text + ';">View carousel</div>';
      } else if (c.imagesStatus === 'generating') {
        actionBlock = '<div style="text-align:center; padding:11px 10px; border-radius:999px; background:' + theme.chipBg + '; font-size:13px; font-weight:700; color:' + theme.muted + '; display:flex; align-items:center; justify-content:center; gap:8px;">' +
          '<span style="width:13px; height:13px; border-radius:50%; border:2px solid ' + theme.border + '; border-top-color:' + ACCENT + '; display:inline-block; animation:rs-spin 0.7s linear infinite;"></span>Rendering' +
        '</div>';
      } else {
        actionBlock = '<div data-action="make-images" data-id="' + c.id + '" style="text-align:center; padding:11px 10px; border-radius:999px; background:' + ACCENT + '; color:#fff; font-size:13px; font-weight:700; cursor:pointer;">Render carousel</div>';
      }

      expandedBody = '<div style="padding:0 20px 20px; display:flex; flex-direction:column; gap:16px;">' +
        '<div style="display:grid; grid-template-columns:1fr 1.15fr 1fr; gap:20px; align-items:start;">' +
          '<div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;">Visual idea</div>' +
            '<div style="aspect-ratio:4/5; border-radius:12px; overflow:hidden; position:relative; background:' + c.visualBg + '; border:1px solid ' + theme.border + ';">' +
              '<div style="position:absolute; inset:0; background-image: radial-gradient(rgba(255,255,255,0.35) 1.2px, transparent 1.2px); background-size:10px 10px;"></div>' +
              '<div style="position:absolute; top:14px; left:14px; font-family:\'Anton\', sans-serif; color:#fff; font-size:22px; text-transform:uppercase; line-height:1;">' + esc(c.hook) + '</div>' +
              '<div style="position:absolute; bottom:12px; left:14px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.85);">' + esc(state.brand.name) + '</div>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;">Suggested caption</div>' +
            '<textarea data-bind="caption" data-id="' + c.id + '" rows="5" style="width:100%; resize:none; font-family:inherit; font-size:13px; padding:11px 13px; border:1px solid ' + theme.border + '; border-radius:10px; background:' + theme.inputBg + '; color:' + theme.text + '; margin-bottom:12px;">' + esc(c.caption) + '</textarea>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">Written idea</div>' +
            '<div style="font-size:12.5px; color:' + theme.muted + '; line-height:1.5; margin-bottom:12px;">' + esc(c.concept) + '</div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">Render prompt</div>' +
            '<textarea data-bind="render-prompt" data-id="' + c.id + '" rows="5" style="width:100%; resize:vertical; font-family:inherit; font-size:12.5px; line-height:1.45; padding:10px 12px; border:1px solid ' + theme.border + '; border-radius:10px; background:' + theme.inputBg + '; color:' + theme.text + ';">' + esc(c.renderPrompt) + '</textarea>' +
          '</div>' +
          '<div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;">Photos</div>' +
            '<div data-action="open-idea" data-id="' + c.id + '" title="Click to view full carousel" style="position:relative; height:180px; margin-bottom:14px; cursor:pointer;">' + miniFrames + '</div>' +
            '<div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">' +
              '<div style="font-size:11px; color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.05em;">Slides</div>' +
              '<div style="display:flex; align-items:center; border:1px solid ' + theme.border + '; border-radius:8px; overflow:hidden; opacity:' + (frameControlDisabled ? '0.4' : '1') + ';">' +
                '<div data-action="dec-frames" data-id="' + c.id + '" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:' + (frameControlDisabled ? 'default' : 'pointer') + '; font-size:13px; color:' + theme.text + ';">−</div>' +
                '<div style="width:22px; text-align:center; font-size:12px; font-weight:700;">' + c.frameCount + '</div>' +
                '<div data-action="inc-frames" data-id="' + c.id + '" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:' + (frameControlDisabled ? 'default' : 'pointer') + '; font-size:13px; color:' + theme.text + ';">＋</div>' +
              '</div>' +
            '</div>' +
            actionBlock +
            (c.failedFrameCount ? '<div data-action="retry-failed" data-id="' + c.id + '" style="text-align:center; padding:9px 10px; border-radius:999px; border:1px solid #C0392B; color:#C0392B; font-size:12px; font-weight:700; cursor:pointer; margin-top:8px;">Retry failed slides</div>' : '') +
            (c.renderError ? '<div style="font-size:11.5px; color:#C0392B; margin-top:8px; line-height:1.4;">' + esc(c.renderError) + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex; align-items:center; gap:10px; border-top:1px solid ' + theme.border + '; padding-top:14px; flex-wrap:wrap;">' +
          '<div data-action="toggle-approve" data-id="' + c.id + '" style="font-size:12.5px; font-weight:700; color:' + c.approveColor + '; cursor:pointer; padding:8px 16px; border-radius:999px; border:1px solid ' + c.approveColor + ';">' + c.approveToggleLabel + '</div>' +
          '<div style="flex:1;"></div>' +
          (c.scheduleError ? '<div style="font-size:11.5px; color:#C0392B;">' + esc(c.scheduleError) + '</div>' : '') +
          (c.scheduled ? '<div style="font-size:12.5px; color:' + theme.muted + ';">Scheduled · ' + esc(c.scheduledLabel) + '</div>' : '') +
          (c.showScheduleButton ? '<div data-action="open-schedule" data-id="' + c.id + '" style="font-size:12.5px; font-weight:700; color:#fff; background:' + ACCENT + '; padding:9px 18px; border-radius:999px; cursor:pointer;">Schedule</div>' : '') +
        '</div>' +
      '</div>';
    }

    return '<div data-idea-card-id="' + c.id + '" style="background:' + theme.cardBg + '; border:1px solid ' + theme.border + '; box-shadow:' + theme.shadow + '; border-radius:16px; overflow:hidden;">' +
      '<div data-action="toggle-expand" data-id="' + c.id + '" style="display:flex; align-items:center; gap:12px; padding:16px 20px; cursor:pointer;">' +
        '<div style="color:' + theme.muted + '; font-size:12px; width:14px; text-align:center; transform:' + caret + '; transition:transform 0.15s ease;">▾</div>' +
        '<div style="width:26px; height:26px; border-radius:6px; background:' + theme.text + '; color:' + theme.bg + '; display:flex; align-items:center; justify-content:center; font-family:\'Anton\',sans-serif; font-size:13px; flex-shrink:0;">' + c.n + '</div>' +
        '<div style="font:var(--text-body-strong); font-size:16px; flex:1;">' + esc(c.title) + '</div>' +
        scheduledTag + approvedTag +
      '</div>' +
      expandedBody +
    '</div>';
  }

  function renderModal(theme, c) {
    var frames = c.frames.map(function (fr) {
      var bgStyle = fr.imageUrl
        ? ('background-image:url(' + fr.imageUrl + '); background-size:cover; background-position:center;')
        : ('background:' + (fr.bg || theme.inputBg) + ';');
      var overlay = '';
      if (!fr.imageUrl && (fr.status === 'pending' || fr.status === 'submitting')) {
        overlay = '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">' +
          '<span style="width:18px; height:18px; border-radius:50%; border:2px solid ' + theme.border + '; border-top-color:' + ACCENT + '; display:inline-block; animation:rs-spin 0.7s linear infinite;"></span>' +
        '</div>';
      } else if (!fr.imageUrl && fr.status === 'failed') {
        overlay = '<div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:12px; text-align:center;">' +
          '<span style="font-size:10.5px; font-weight:700; color:#C0392B; background:rgba(255,255,255,0.92); border-radius:8px; padding:6px 8px; line-height:1.3;">' + esc(fr.error || 'Failed to render') + '</span>' +
        '</div>';
      }
      var textOverlay = fr.imageUrl ? (
        '<div style="position:absolute; inset:0; display:flex; flex-direction:column; justify-content:flex-end; padding:12px;">' +
          '<div style="font-family:\'Anton\', sans-serif; color:#fff; font-size:16px; line-height:1.15; text-shadow:0 2px 6px rgba(0,0,0,0.4); margin-bottom:6px; text-transform:uppercase;">' + esc(fr.hook) + '</div>' +
          '<div style="font-size:8.5px; letter-spacing:0.06em; color:rgba(255,255,255,0.8); text-transform:uppercase;">' + esc(fr.photoLabel) + '</div>' +
        '</div>'
      ) : '';
      var statusColor = fr.status === 'failed' ? '#C0392B' : (fr.status === 'complete' ? ACCENT : theme.muted);
      return '<div style="width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:9px;">' +
        '<div style="aspect-ratio:4/5; border-radius:12px; position:relative; overflow:hidden; ' + bgStyle + ' border:1px solid ' + theme.border + ';">' +
          '<div style="position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.9); color:#173F35; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px;">' + fr.n + '</div>' +
          overlay +
          textOverlay +
        '</div>' +
        '<div style="font-size:11.5px; line-height:1.45; color:' + theme.muted + '; display:flex; flex-direction:column; gap:5px;">' +
          '<div style="font-weight:800; color:' + statusColor + '; text-transform:uppercase; letter-spacing:0.04em;">' + esc(fr.status || 'draft') + '</div>' +
          '<div><strong style="color:' + theme.text + ';">Asset:</strong> ' + esc(fr.photoLabel || 'None') + (fr.photoRole ? ' <span style="color:' + theme.muted + ';">(' + esc(fr.photoRole) + ')</span>' : '') + '</div>' +
          '<details style="border:1px solid ' + theme.border + '; border-radius:8px; padding:7px 8px; background:' + theme.inputBg + ';">' +
            '<summary style="cursor:pointer; font-weight:700; color:' + theme.text + ';">Prompt</summary>' +
            '<div style="margin-top:6px; white-space:pre-wrap; color:' + theme.muted + ';">' + esc(fr.prompt || c.renderPrompt || '') + '</div>' +
          '</details>' +
          (fr.error ? '<div style="color:#C0392B;"><strong>Error:</strong> ' + esc(fr.error) + '</div>' : '') +
          (fr.status === 'failed' ? '<div data-action="retry-slide" data-id="' + c.id + '" data-slide="' + fr.n + '" style="align-self:flex-start; padding:7px 11px; border-radius:999px; border:1px solid #C0392B; color:#C0392B; font-weight:800; cursor:pointer;">Retry slide</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    var dots = c.frames.map(function () {
      return '<div style="width:5px; height:5px; border-radius:50%; background:' + theme.border + ';"></div>';
    }).join('');

    var actionSection = '';
    if (c.imagesStatus === 'none') {
      actionSection += '<div data-action="make-images" data-id="' + c.id + '" style="align-self:flex-start; padding:12px 22px; border-radius:999px; background:' + ACCENT + '; color:#fff; font-weight:700; font-size:13.5px; cursor:pointer;">Render carousel</div>';
      if (c.renderError) actionSection += '<div style="font-size:12px; color:#C0392B; line-height:1.4;">' + esc(c.renderError) + '</div>';
    }
    if (c.imagesStatus === 'generating') {
      actionSection += '<div style="display:flex; align-items:center; gap:8px; padding:12px 22px; border-radius:999px; background:' + theme.chipBg + '; color:' + theme.muted + '; font-weight:700; font-size:13.5px; align-self:flex-start;">' +
        '<span style="width:13px; height:13px; border-radius:50%; border:2px solid ' + theme.border + '; border-top-color:' + ACCENT + '; display:inline-block; animation:rs-spin 0.7s linear infinite;"></span>Rendering…' +
      '</div>';
    }
    if (c.imagesStatus === 'ready') {
      actionSection += '<div style="display:flex; align-items:center; justify-content:space-between; background:' + theme.inputBg + '; border:1px solid ' + theme.border + '; border-radius:12px; padding:15px 17px;">' +
        '<div style="font-size:13.5px; font-weight:700; color:' + c.approveColor + ';">' + c.approveLabel + '</div>' +
        '<div data-action="toggle-approve" data-id="' + c.id + '" style="font-size:12.5px; font-weight:700; color:' + ACCENT + '; cursor:pointer;">' + c.approveToggleLabel + '</div>' +
      '</div>';
    }
    if (c.failedFrameCount) {
      actionSection += '<div data-action="retry-failed" data-id="' + c.id + '" style="align-self:flex-start; padding:11px 20px; border-radius:999px; border:1px solid #C0392B; color:#C0392B; font-weight:800; font-size:13px; cursor:pointer;">Retry failed slides</div>';
    }
    if (c.scheduled) {
      actionSection += '<div style="display:flex; align-items:center; gap:10px; background:' + theme.achievementBg + '; border:1px solid ' + theme.achievementBorder + '; border-radius:12px; padding:15px 17px;">' +
        '<div>' +
          '<div style="font-size:13.5px; font-weight:800; color:' + theme.text + ';">Scheduled for ' + esc(c.scheduledLabel) + '</div>' +
          '<div style="font-size:12px; color:' + theme.muted + ';">' + esc(c.schedulePlatform) + '</div>' +
        '</div>' +
      '</div>';
    }
    if (c.showScheduleForm) {
      actionSection += '<div style="background:' + theme.inputBg + '; border:1px solid ' + theme.border + '; border-radius:12px; padding:17px; display:flex; flex-direction:column; gap:13px;">' +
        '<div style="display:flex; gap:12px;">' +
          '<div style="flex:1;">' +
            '<div style="font-size:11px; color:' + theme.muted + '; margin-bottom:5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;">Date</div>' +
            '<input type="date" data-bind="schedule-date" data-id="' + c.id + '" value="' + esc(c.scheduleDate) + '" style="width:100%; padding:8px 10px; border:1px solid ' + theme.border + '; border-radius:8px; font-family:inherit; font-size:13px; background:' + theme.cardBg + '; color:' + theme.text + ';" />' +
          '</div>' +
          '<div style="flex:1;">' +
            '<div style="font-size:11px; color:' + theme.muted + '; margin-bottom:5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;">Time</div>' +
            '<input type="time" data-bind="schedule-time" data-id="' + c.id + '" value="' + esc(c.scheduleTime) + '" style="width:100%; padding:8px 10px; border:1px solid ' + theme.border + '; border-radius:8px; font-family:inherit; font-size:13px; background:' + theme.cardBg + '; color:' + theme.text + ';" />' +
          '</div>' +
          '<div style="flex:1;">' +
            '<div style="font-size:11px; color:' + theme.muted + '; margin-bottom:5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;">Platform</div>' +
            '<select data-bind="schedule-platform" data-id="' + c.id + '" style="width:100%; padding:8px 10px; border:1px solid ' + theme.border + '; border-radius:8px; font-family:inherit; font-size:13px; background:' + theme.cardBg + '; color:' + theme.text + ';">' +
              '<option value="Instagram Feed"' + (c.schedulePlatform === 'Instagram Feed' ? ' selected' : '') + '>Instagram Feed</option>' +
              '<option value="Instagram Stories"' + (c.schedulePlatform === 'Instagram Stories' ? ' selected' : '') + '>Instagram Stories</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div data-action="confirm-schedule" data-id="' + c.id + '" style="align-self:flex-start; padding:11px 20px; border-radius:999px; background:' + ACCENT + '; color:#fff; font-weight:700; font-size:13px; cursor:pointer;">Confirm schedule</div>' +
        (c.scheduleError ? '<div style="font-size:12px; color:#C0392B; line-height:1.4;">' + esc(c.scheduleError) + '</div>' : '') +
      '</div>';
    }
    if (c.showScheduleButton) {
      actionSection += '<div data-action="open-schedule" data-id="' + c.id + '" style="align-self:flex-start; padding:12px 24px; border-radius:999px; background:' + ACCENT + '; color:#fff; font-weight:700; font-size:13.5px; cursor:pointer;">Schedule</div>';
    }

    return '<div data-modal-shell data-action="close-modal" style="position:fixed; inset:0; background:rgba(14,41,33,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:32px;">' +
      '<div style="background:' + theme.cardBg + '; border:1px solid ' + theme.border + '; box-shadow:' + theme.shadowRaised + '; border-radius:20px; width:min(960px, 100%); max-height:88vh; overflow-y:auto; padding:30px 34px;">' +
        '<div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px;">' +
          '<div>' +
            '<div style="font-size:11px; font-weight:700; color:' + ACCENT + '; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px;">' + esc(c.tag) + '</div>' +
            '<div style="font-size:24px; font-family:\'Anton\',sans-serif; text-transform:uppercase; letter-spacing:0.01em;">' + esc(c.title) + '</div>' +
          '</div>' +
          '<div data-action="close-modal" style="cursor:pointer; color:' + theme.muted + '; font-size:24px; line-height:1; padding:4px;">×</div>' +
        '</div>' +
        '<div style="font-size:13.5px; color:' + theme.muted + '; margin-bottom:22px;">' + esc(c.concept) + '</div>' +
        '<div class="rs-frames-scroll" style="display:flex; gap:14px; overflow-x:auto; padding:6px 2px 16px; margin-bottom:6px;">' + frames + '</div>' +
        '<div style="display:flex; justify-content:center; gap:5px; margin-bottom:24px;">' + dots + '</div>' +
        '<div style="border-top:1px solid ' + theme.border + '; padding-top:20px; display:flex; flex-direction:column; gap:17px;">' +
          '<div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;">Render prompt</div>' +
            '<textarea data-bind="render-prompt" data-id="' + c.id + '" rows="4" style="width:100%; resize:vertical; font-family:inherit; font-size:13px; line-height:1.45; padding:11px 13px; border:1px solid ' + theme.border + '; border-radius:10px; background:' + theme.inputBg + '; color:' + theme.text + ';">' + esc(c.renderPrompt) + '</textarea>' +
          '</div>' +
          '<div>' +
            '<div style="font:var(--text-utility-xs); color:' + theme.muted + '; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:9px;">Caption</div>' +
            '<textarea data-bind="caption" data-id="' + c.id + '" rows="3" style="width:100%; resize:vertical; font-family:inherit; font-size:13.5px; padding:11px 13px; border:1px solid ' + theme.border + '; border-radius:10px; background:' + theme.inputBg + '; color:' + theme.text + ';">' + esc(c.caption) + '</textarea>' +
          '</div>' +
          actionSection +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ---- event binding ----

  function bindEvents() {
    if (eventsBound) return;
    eventsBound = true;
    root.addEventListener('click', onRootClick);
    root.addEventListener('input', onRootInput);
    root.addEventListener('change', onRootChange);
    root.addEventListener('keydown', onRootKeyDown);
  }

  function onRootClick(e) {
    var modalBackdrop = e.target.closest('[data-action="close-modal"]');
    if (modalBackdrop && e.target === modalBackdrop) { onCloseModal(); return; }

    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    if (action === 'close-modal') return; // handled above only on direct backdrop hit
    var id = el.getAttribute('data-id');
    var idNum = id !== null ? Number(id) : null;

    switch (action) {
      case 'toggle-dark': toggleDarkMode(); break;
      case 'toggle-sidebar': toggleSidebar(); break;
      case 'toggle-scheduled-popover': toggleScheduledPopover(); break;
      case 'analyze': onAnalyze(); break;
      case 'cycle-font': onCycleFont(); break;
      case 'add-swatch': onAddSwatch(); break;
      case 'swatch-click': onSwatchClick(Number(el.getAttribute('data-idx'))); break;
      case 'pick-color': onPickColor(Number(el.getAttribute('data-idx')), el.getAttribute('data-hex')); break;
      case 'remove-tag': onRemoveTag(Number(el.getAttribute('data-idx'))); break;
      case 'add-imagery': triggerUpload('imagery', null); break;
      case 'replace-imagery': triggerUpload('imagery', idNum); break;
      case 'add-photo': triggerUpload('photo', null); break;
      case 'replace-photo': triggerUpload('photo', idNum); break;
      case 'remove-photo': onRemovePhoto(idNum); break;
      case 'dec-idea-count': onDecIdeaCount(); break;
      case 'inc-idea-count': onIncIdeaCount(); break;
      case 'generate': generateIdeas(); break;
      case 'toggle-expand': onToggleExpand(idNum); break;
      case 'dec-frames': onDecFrames(idNum); break;
      case 'inc-frames': onIncFrames(idNum); break;
      case 'make-images': onMakeImages(idNum); break;
      case 'retry-slide': retrySlide(idNum, Number(el.getAttribute('data-slide'))); break;
      case 'retry-failed': retryFailedSlides(idNum); break;
      case 'open-idea': onOpenIdea(idNum); break;
      case 'toggle-approve': onToggleApprove(idNum); break;
      case 'open-schedule': onOpenSchedule(idNum); break;
      case 'confirm-schedule': onConfirmSchedule(idNum); break;
    }
  }

  function onRootInput(e) {
    var el = e.target;
    var bind = el.getAttribute && el.getAttribute('data-bind');
    if (!bind) return;
    if (bind === 'newTag') { setSilent({ newTagValue: el.value }); return; }
    if (bind === 'brandUrl') { setSilent({ brandUrl: el.value }); return; }
    if (bind === 'topic') { setSilent({ topic: el.value }); return; }
    if (bind === 'caption') { updateIdeaSilent(Number(el.getAttribute('data-id')), { caption: el.value }); return; }
    if (bind === 'render-prompt') { updateIdeaSilent(Number(el.getAttribute('data-id')), { renderPrompt: el.value }); return; }
    if (bind === 'asset-label') {
      var assetId = Number(el.getAttribute('data-id'));
      updateBrandSilent(function (b) { return { photos: b.photos.map(function (p) { return p.id === assetId ? Object.assign({}, p, { label: el.value }) : p; }) }; });
      return;
    }
  }

  function onRootChange(e) {
    var el = e.target;
    var bind = el.getAttribute && el.getAttribute('data-bind');
    if (!bind) return;
    var id = Number(el.getAttribute('data-id'));
    if (bind === 'schedule-date') { updateIdeaSilent(id, { scheduleDate: el.value }); return; }
    if (bind === 'schedule-time') { updateIdeaSilent(id, { scheduleTime: el.value }); return; }
    if (bind === 'schedule-platform') { updateIdeaSilent(id, { schedulePlatform: el.value }); return; }
    if (bind === 'asset-role') {
      updateBrandSilent(function (b) { return { photos: b.photos.map(function (p) { return p.id === id ? Object.assign({}, p, { role: el.value }) : p; }) }; });
      return;
    }
  }

  function onRootKeyDown(e) {
    var el = e.target;
    var bind = el.getAttribute && el.getAttribute('data-bind');
    if (bind === 'newTag') onNewTagKeyDown(e);
    if (bind === 'brandUrl' && e.key === 'Enter') onAnalyze();
  }

  document.getElementById('rs-file-input').addEventListener('change', function (e) {
    var file = e.target.files && e.target.files[0];
    e.target.value = '';
    onFileChosen(file);
  });

  fetch('/api/config-status').then(function (r) { return r.json(); }).then(function (data) {
    set({ configStatus: data });
  }).catch(function () { /* backend unreachable; leave banner unset, actions will surface their own errors */ });

  if (!state.ideas.length && !state.ideasLoading) {
    generateIdeas();
  } else {
    render();
  }
})();
</script>
</body>
</html>
